[package]
name = "samloader"
version = "1.0.0"
edition = "2024"
license = "Apache-2.0"
description = "Download firmware for Samsung devices"
repository = "https://github.com/topjohnwu/samloader-rs"
keywords = ["samsung", "firmware"]
exclude = [".cargo/**", ".github/**"]

[dependencies]
reqwest = { version = "0.13", default-features = false, features = [
    "blocking",
    "cookies",
    "native-tls-no-alpn",
    "native-tls-vendored",
] }
aes = "0.8"
cbc = "0.1"
ecb = "0.1"
md-5 = "0.10"
base64 = "0.22"
clap = { version = "4.5", features = ["derive"] }
roxmltree = "0.21"
indicatif = "0.18"
memmap2 = "0.9"

[profile.release]
strip = true
lto = true
opt-level = 3
