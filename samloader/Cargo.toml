repository = "https://github.com/topjohnwu/samloader-rs"
keywords = ["samsung", "firmware"]

[dependencies]
samloader-fus = { path = "../samloader-fus" }
clap = { version = "4.6", features = ["derive"] }
indicatif = "0.18"
